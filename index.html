<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Examples</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
      padding: 48px 24px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 40px;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: #58a6ff;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 40px;
      max-width: 900px;
    }

    .project {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }

    .project-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px;
      border-bottom: 1px solid #21262d;
    }

    .project-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #1f6feb22;
      border: 1px solid #1f6feb55;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .project-name {
      font-size: 1rem;
      font-weight: 600;
      color: #f0f6fc;
    }

    .project-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: #8b949e;
      background: #21262d;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .versions {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 20px 24px;
    }

    .version-card {
      display: block;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    .version-card:hover {
      border-color: #58a6ff;
      background: #1f2937;
    }

    .version-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      margin-bottom: 6px;
    }

    .version-name {
      font-size: 1rem;
      font-weight: 600;
      color: #58a6ff;
    }

    .version-arrow {
      display: inline-block;
      margin-left: 4px;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }

    .version-card:hover .version-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    .status {
      color: #8b949e;
      font-size: 0.9rem;
      padding: 12px 0;
    }

    .error {
      color: #f85149;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 24px;
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .error code {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
      color: #e1e4e8;
    }
  </style>
</head>
<body>
  <h1>Website <span>Examples</span></h1>

  <div class="projects" id="projects">
    <p class="status">Loading projects...</p>
  </div>

  <script>
    // Icon mapping: keyword in project name → emoji
    const ICONS = {
      'real-estate': '🏠',
      'estate':      '🏠',
      'jsoms':       '🎨',
      'shop':        '🛍️',
      'portfolio':   '💼',
      'blog':        '📝',
      'dashboard':   '📊',
      'auth':        '🔐',
      'landing':     '🚀',
      'ecommerce':   '🛒',
    };

    function getIcon(name) {
      const lower = name.toLowerCase();
      for (const [key, icon] of Object.entries(ICONS)) {
        if (lower.includes(key)) return icon;
      }
      return '🌐';
    }

    // Returns true if the URL responds with 2xx
    async function exists(url) {
      try {
        const res = await fetch(url, { method: 'HEAD' });
        return res.ok;
      } catch {
        return false;
      }
    }

    // Discover versions for a project by probing:
    //   1. vN/index.html  (v1, v2, v3, …) — stops at first missing version
    //   2. Falls back to direct index.html if no versioned dirs found
    async function discoverVersions(name) {
      const versions = [];

      for (let i = 1; ; i++) {
        const href = `${name}/v${i}/index.html`;
        if (await exists(href)) {
          versions.push({ label: `v${i}`, href });
        } else {
          break;
        }
      }

      if (versions.length === 0 && await exists(`${name}/index.html`)) {
        versions.push({ label: 'Latest', href: `${name}/index.html` });
      }

      return versions;
    }

    async function loadProjects() {
      const container = document.getElementById('projects');

      // Load project list from projects.json
      let names;
      try {
        const res = await fetch('projects.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        names = await res.json();
      } catch (err) {
        container.innerHTML = `<div class="error">Could not load <code>projects.json</code>: ${err.message}</div>`;
        return;
      }

      // Probe all projects in parallel
      const results = await Promise.all(
        names.map(async name => ({ name, versions: await discoverVersions(name) }))
      );

      const projects = results.filter(p => p.versions.length > 0);

      if (projects.length === 0) {
        container.innerHTML = '<p class="status">No projects found. Check that each project folder contains an <code>index.html</code>.</p>';
        return;
      }

      container.innerHTML = projects.map(p => `
        <div class="project">
          <div class="project-header">
            <div class="project-icon">${getIcon(p.name)}</div>
            <div class="project-name">${p.name}</div>
            <div class="project-count">${p.versions.length} version${p.versions.length !== 1 ? 's' : ''}</div>
          </div>
          <div class="versions">
            ${p.versions.map(v => `
              <a href="${v.href}" class="version-card">
                <div class="version-label">version</div>
                <div class="version-name">${v.label} <span class="version-arrow">→</span></div>
              </a>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    loadProjects();
  </script>
</body>
</html>
